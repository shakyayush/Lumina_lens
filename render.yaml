services:
  - type: web
    name: lumina-lens-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # Set manually in Render dashboard
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RTC_PROVIDER_URL
        value: ""
      - key: RTC_API_KEY
        value: ""
      - key: RTC_API_SECRET
        value: ""
